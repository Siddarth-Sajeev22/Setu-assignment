# Alembic configuration file
# This file controls how Alembic operates

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to datetime.tz.gettz()
# leave blank for localtime
# timezone =

# max length of the revision id
# revision_id_length = 4

# a list of file extensions to consider as Python files
# defaults to py,pyi
# sqlalchemy_module_path = /usr/lib/pythonN.N/site-packages/sqlalchemy

# Compare type from its default name with the one reflected from the database.
# compare_type = false

# Compare server default, working around MC8283 from the example
# compare_server_default=false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
